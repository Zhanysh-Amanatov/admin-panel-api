services:
  postgres:
    image: postgres:16-alpine
    container_name: dev_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: dev_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # MinIO S3 API (Node.js connects here)
      - "9001:9001" # MinIO Web UI Console
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
